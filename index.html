        // --- Notification Audio Synthesizer ---
        const playBeep = () => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (ctx.state === 'suspended') ctx.resume();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1400, ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.4);
            } catch (e) { console.log(e); }
        };

        function MemoryGame() {
            const initialCards = ['🌹', '🌹', '💍', '💍', '💖', '💖', '👫', '👫', '🌍', '🌍', '💌', '💌'];

            const [flipped, setFlipped] = useState([]);
            const [solved, setSolved] = useState([]);
            const [won, setWon] = useState(false);

            useEffect(() => {
                const shuffled = [...initialCards].sort(() => Math.random() - 0.5).map((emoji, index) => ({ id: index, emoji }));
                setCards(shuffled);
            }, []);

            useEffect(() => {
                if (solved.length > 0 && solved.length === initialCards.length) {
                    setTimeout(() => setWon(true), 1000);

            const handleClick = (index) => {
                if (flipped.includes(index) || solved.includes(index) || flipped.length >= 2) return;
                
                const newFlipped = [...flipped, index];
                setFlipped(newFlipped);
                
                if (newFlipped.length === 2) {
                    const [first, second] = newFlipped;
                    if (cards[first].emoji === cards[second].emoji) {
                        setSolved([...solved, first, second]);
                        setFlipped([]);
                    } else {
                        setTimeout(() => setFlipped([]), 800);
                    }
                }
            };

            return (
                <section className="py-24 relative z-10 bg-slate-900/50 backdrop-blur-sm border-y border-slate-800/50">

                                const isFlipped = flipped.includes(i) || solved.includes(i);
                                return (
                                    <div 
                                        key={i} 
                                        onClick={() => handleClick(i)}
                                        className={`aspect-square w-full rounded-2xl flex items-center justify-center text-4xl md:text-6xl cursor-pointer transition-all duration-300 transform border-2 ${isFlipped ? 'bg-slate-900 border-rose-500 shadow-[0_0_20px_rgba(244,63,94,0.3)] scale-[1.02]' : 'bg-slate-800/80 border-slate-700 hover:scale-105 shadow-xl hover:border-slate-500'}`}

                                        <span className={`transition-all duration-300 drop-shadow-md ${isFlipped ? 'opacity-100 scale-100 rotate-0' : 'opacity-0 scale-50 -rotate-12'}`}>
                                            {card.emoji}
                                        </span>
                                    </div>
                                );
                            })}

                                    إعجابي أقوى من كل شيء..
                                </p>
                                <p className="text-3xl md:text-5xl font-bold text-rose-400 animate-pulse drop-shadow-[0_0_20px_rgba(244,63,94,0.5)]" style={{animation:'zoomIn 1s ease-out 1s both, pulse 2s infinite 2s'}}>
                                    وأتمنى تديني فرصة ♾️
                                </p>
                                {step >= 9 && (
                                    <div style={{animation:'fadeIn 1s ease-out'}}>
                                        <p className="text-lg md:text-2xl text-slate-400 mt-10 font-serif italic border-t border-rose-500/30 pt-6 drop-shadow-md">For the rest of our life.</p>
                                        <p className="text-base md:text-lg text-rose-500/70 mt-4 font-medium" style={{animation:'slideUp 1s ease-out 1s both'}}>— أنا دايماً وبال forever, عبد الرحمن 💌</p>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function BotChat() {
            const [isOpen, setIsOpen] = useState(false);
            const [messages, setMessages] = useState(() => {
                const saved = localStorage.getItem('romantic_chat_v2');
                if (saved) {
                    try { return JSON.parse(saved); } catch(e) {}
                }
                return [{ id: 1, text: "أهلاً يا رغدة ❤️.. نورتي الشات، كنت لسه بفكر فيكي بالمناسبة!", sender: "bot", time: new Date().toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'}) }];
            });
            const [input, setInput] = useState("");
            const [isTyping, setIsTyping] = useState(false);
            const messagesEndRef = useRef(null);

            const GEMINI_KEY = typeof window !== 'undefined' ? window.GEMINI_KEY : "";

            async function getAIReply(userMsg, chatHistory) {
                const history = chatHistory.slice(-8).map(m => `${m.sender === 'user' ? 'رغدة' : 'عبد الرحمن'}: ${m.text}`).join('\n');
                
                const prompt = `أنت عبد الرحمن، شاب مصري رومانسي بتحب حبيبتك رغدة بجد. بتكلمها بحب وصدق وعفوية بالعامية المصرية. ردودك طبيعية ومش متكلفة، زي أي حد بيكلم حبيبته. تستخدم أسماء دلع زي: يا رغدة، يا روحي، يا رغدة، يا عمري، يا قمر. تكون ردودك متنوعة ومش مكررة.

المحادثة السابقة:
${history}

رسالة رغدة الجديدة: ${userMsg}

رد عبد الرحمن الطبيعي:`;

                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${GEMINI_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: { temperature: 0.95, maxOutputTokens: 120, topP: 0.95 }
                        })
                    });
                    if (res.ok) {
                        const data = await res.json();
                        const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
                        if (text && text.length > 5) return text.replace(/^(عبد الرحمن|عبدالرحمن):\s*/i, '').trim();
                    }
                } catch (e) {}

                // Try free Hugging Face AI as backup
                try {
                    const hfRes = await fetch("https://api-inference.huggingface.co/models/google/gemma-2b-it", {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ inputs: prompt, parameters: { max_new_tokens: 100, temperature: 0.9 } })
                    });
                    if (hfRes.ok) {
                        const hfData = await hfRes.json();
                        const hfText = hfData?.[0]?.generated_text;
                        if (hfText && hfText.length > 5) return hfText.split('رد عبد الرحمن الطبيعي:').pop().trim().substring(0, 200);
                    }
                } catch (e) {}

                // Smart fallback if AI fails
                const msg = userMsg.toLowerCase();
                if (msg.includes("بحب") || msg.includes("love")) return "وأنا معجب بيكي أكتر بكتير يا رغدة 🥺❤️ حبك نابع في قلبي ومش قادر أستغنى عنه.";
                if (msg.includes("وحش") || msg.includes("اشتقت") || msg.includes("miss")) return "وأنا كمان مفتقد كلامنا.. الأيام اللي مبشوفكش فيها بتبقى ناقصة حاجة بجد ✨";
                if (msg.includes("حلو") || msg.includes("جميل") || msg.includes("pretty")) return "إنتِ اللي عينيكي حلوة وتفاصيلك كلها جميلة يا رغدة 😍";
                if (msg.includes("مشغول") || msg.includes("شغل") || msg.includes("busy")) return "حتى لو في عز الشغل، دايماً بتيجي على بالي وببتسم 😌✨";
                if (msg.includes("زعل") || msg.includes("تعبان") || msg.includes("عيان") || msg.includes("مرض")) return "لو مضايقة أو زعلانة.. أنا موجود في أي وقت لو حبيتي تتكلمي 🌸";
                if (msg.includes("نوم") || msg.includes("نام") || msg.includes("sleep")) return "تصبحي على خير وسعادة يا رغدة.. أحلام سعيدة 🌙✨";
                if (msg.includes("بكره") || msg.includes("كراه")) return "إنتِ بجد شخصية طيبة ومريحة جداً في التعامل 🌸";
                if (msg.includes("أكل") || msg.includes("اكل") || msg.includes("جوع") || msg.includes("hungry")) return "لو حبيتي ناكل سوا في يوم، أنا عازمك على أحلى أكل 🍕✨";
                if (msg.includes("خروج") || msg.includes("نزهة") || msg.includes("مشي") || msg.includes("walk")) return "أتمنى في يوم توافقي نخرج سوا ونقعد نتكلم براحتنا ☕🌅";
                if (msg.includes("عبد الرحمن") || msg.includes("عبدالرحمن")) return "أنا موجود.. سامعك ومهتم بكل كلمة بتقوليها ✨";
                if (msg.includes("رغدة") || msg.includes("raghda")) return "اسمك لوحده بيفرحني يا رغدة.. بجد إنتِ مميزة 🌸";
                if (msg.includes("ضم") || msg.includes("حضن") || msg.includes("hug")) return "أتمنى دايماً أكون مصدر ثقة ليكي وتقدري تعتمدي عليا 🤗";
                if (msg.includes("بوس") || msg.includes("kiss") || msg.includes("قبل")) return "كل الاحترام والتقدير ليكي ولعقليتك يا رغدة بجد 🌸";
                if (msg.includes("ضحك") || msg.includes("هزار") || msg.includes("joke") || msg.includes("laugh")) return "ابتسامتك دي بالدنيا.. أتمنى تفضلي دايماً بتضحكي 😁✨";
                if (msg.includes("حبيب") || msg.includes("baeb") || msg.includes("babe") || msg.includes("حب")) return "أتمنى تديني الفرصة أكون أقرب ليكي وأثبتلك مشاعري 🥹❤️";
                if (msg.includes("غضب") || msg.includes("زعله") || msg.includes("غريان") || msg.includes("غيره")) return "لا متزعليش مني يا رغدة، أنا بتعلم منك و معجب بيكي حب ميفهموش غيرنا 😔💔❤️";
                if (msg.includes("فرح") || msg.includes("سعيد") || msg.includes("happy") || msg.includes("مبسوط")) return "مبسوط جداً إني شايفك فرحانة، يارب دايماً 🥹✨";
                if (msg.includes("مزاج") || msg.includes("حالة")) return "راحتك النفسية تهمني جداً، أتمنى تكوني دايماً بخير 💭";

                const replies = [
                    "معجب بيكي أوي يا رغدة بجد من كل قلبي 🥺❤️",
                    "وحشتيني يا روحي حتى و إحنا سوا 💕",
                    "أنتي كل حاجة ليا يا رغدة، من غيرك مفيش حاجة 🌹",
                    "بفكر فيكي دلوقتي كالعادة 😍",
                    "يا أجمل حاجة في حياتي يا رغدة 🥰",
                    "ضحكتك بتخليني أنسى الدنيا كلها يا رغدة 😁❤️",
                    "بفتكر كلامك و أنا لوحدي و بضحك 🥹💕",
                    "وجودك في حياتي نعمة مش عارف أشكر ربنا عليها 🥺🤲❤️"
                ];
                return replies[Math.floor(Math.random() * replies.length)];
            }

            useEffect(() => {
                localStorage.setItem('romantic_chat_v2', JSON.stringify(messages));
                scrollToBottom();
            }, [messages, isOpen, isTyping]);

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            const handleSend = async () => {
                if (!input.trim()) return;
                
                const newMsg = {
                    id: Date.now(),
                    text: input,
                    sender: "user",
                    time: new Date().toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit'})
                };
                
                setMessages(prev => [...prev, newMsg]);
                const userText = input;
                setInput("");
                setIsTyping(true);
                
                const replyText = await getAIReply(userText, messages);
                
                const reply = {
                    id: Date.now() + 1,
                    text: replyText,
                    sender: "bot",
                    time: new Date().toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit'})
                };
                setMessages(prev => [...prev, reply]);
                setIsTyping(false);
            };

            const deleteMessage = (id) => {
                setMessages(prev => prev.filter(m => m.id !== id));
            };

            const clearChat = () => {
                if(confirm("هل أنت متأكد من مسح جميع الرسائل؟")) {
                    setMessages([{ id: 1, text: "مهما مسحت الرسايل إعجابي هيفضل محفور في قلبي للأبد 🥺❤️", sender: "bot", time: new Date().toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'}) }]);
                }
            };

            return (
                <div className="fixed bottom-6 left-6 md:bottom-10 md:left-10 z-[110]" dir="rtl">
                    {!isOpen ? (
                        <button onClick={() => setIsOpen(true)} className="w-16 h-16 md:w-20 md:h-20 bg-gradient-to-tr from-rose-600 to-indigo-700 rounded-full shadow-[0_0_20px_rgba(225,29,72,0.6)] cursor-pointer flex items-center justify-center hover:scale-110 transition-transform animate-pulse border-2 border-white/20 text-white">
                            <svg viewBox="0 0 24 24" width="32" height="32" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                        </button>
                    ) : (
                        <div className="bg-slate-100 w-[90vw] md:w-[350px] h-[75vh] md:h-[500px] max-h-[80vh] rounded-3xl shadow-[0_15px_50px_rgba(0,0,0,0.5)] overflow-hidden flex flex-col font-sans animate-fade-in relative z-[120] border border-slate-300">
                            {/* Header */}
                            <div className="bg-gradient-to-r from-rose-600 to-indigo-700 text-white p-3 flex items-center justify-between shadow-md relative z-20">
                                <div className="flex items-center gap-3">
                                    <button onClick={() => setIsOpen(false)} className="text-white hover:text-slate-200 p-1">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                                    </button>
                                    <div className="w-10 h-10 bg-white rounded-full flex items-center justify-center text-rose-600 font-bold overflow-hidden border-2 border-white/50">ع</div>
                                    <div>
                                        <h3 className="font-bold text-lg leading-tight">عبد الرحمن ❤️</h3>
                                        <p className="text-xs text-rose-200">{isTyping ? "يكتب الآن..." : "متصل الآن"}</p>
                                    </div>
                                </div>
                                <button onClick={clearChat} className="text-white hover:text-red-300 p-2" title="مسح المحادثة">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                                </button>
                            </div>

                            {/* Chat Body */}
                            <div className="flex-1 p-4 overflow-y-auto relative scroll-smooth flex flex-col gap-3 bg-slate-50">
                                {messages.map((m) => (
                                    <div key={m.id} className={`max-w-[85%] rounded-2xl p-3 shadow-sm relative group text-sm md:text-base ${m.sender === "user" ? 'bg-indigo-600 text-white self-end rounded-bl-sm' : 'bg-white text-slate-800 self-start rounded-br-sm border border-slate-200'}`}>
                                        <button onClick={() => deleteMessage(m.id)} className={`absolute top-1/2 -translate-y-1/2 hidden group-hover:flex items-center justify-center p-1.5 rounded-full bg-red-100 text-red-600 hover:bg-red-200 transition ${m.sender === "user" ? "-left-10" : "-right-10"}`} title="حذف الرسالة">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                                        </button>
                                        <p className="whitespace-pre-wrap leading-relaxed">{m.text}</p>
                                        <div className={`text-[10px] mt-1 flex justify-end gap-1 items-center ${m.sender === "user" ? "text-indigo-200" : "text-slate-400"}`}>
                                            {m.time}
                                            {m.sender === "user" && (
                                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 7 17l-5-5"/><path d="m22 10-7.5 7.5L13 16"/></svg>
                                            )}
                                        </div>
                                    </div>
                                ))}
                                {isTyping && (
                                    <div className="bg-white border border-slate-200 self-start rounded-2xl rounded-br-sm p-3 shadow-sm w-16 h-10 flex items-center justify-center gap-1.5 text-slate-800">
                                        <div className="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style={{animationDelay: "0ms"}}></div>
                                        <div className="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style={{animationDelay: "150ms"}}></div>
                                        <div className="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style={{animationDelay: "300ms"}}></div>
                                    </div>
                                )}
                                <div ref={messagesEndRef} className="pb-2 text-transparent">.</div>
                            </div>

                            {/* Input Area */}
                            <div className="bg-white p-3 flex items-center gap-2 border-t border-slate-200">
                                <div className="flex-1 bg-slate-100 rounded-full flex items-center px-4 py-2 border border-slate-200">
                                    <input 
                                        type="text"
                                        value={input}
                                        onChange={(e) => setInput(e.target.value)}
                                        onKeyPress={(e) => e.key === 'Enter' && handleSend()}
                                        placeholder="اكتبي رسالة لعبد الرحمن..."
                                        className="flex-1 outline-none border-none bg-transparent text-slate-800 placeholder-slate-400 text-sm md:text-base w-full"
                                    />
                                </div>
                                <button 
                                    onClick={handleSend}
                                    className={`w-12 h-12 rounded-full flex items-center justify-center shadow-md transition-colors ${input.trim() ? 'bg-rose-600 hover:bg-rose-700' : 'bg-slate-300'} text-white shrink-0`}
                                >
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" className="mr-1 -ml-1"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LoveWebsite />);
    </script>
</body>

</html>

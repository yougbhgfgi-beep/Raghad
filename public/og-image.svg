<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Stars -->
  <circle cx="100" cy="80" r="2" fill="white" opacity="0.6"/>
  <circle cx="300" cy="50" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="500" cy="120" r="2.5" fill="white" opacity="0.7"/>
  <circle cx="700" cy="60" r="1.8" fill="white" opacity="0.5"/>
  <circle cx="900" cy="90" r="2" fill="white" opacity="0.6"/>
  <circle cx="1100" cy="40" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="200" cy="550" r="2" fill="white" opacity="0.5"/>
  <circle cx="800" cy="580" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="1050" cy="520" r="2.5" fill="white" opacity="0.6"/>

  <!-- Decorative rings -->
  <circle cx="600" cy="280" r="180" fill="none" stroke="rgba(225,29,72,0.08)" stroke-width="1"/>
  <circle cx="600" cy="280" r="140" fill="none" stroke="rgba(225,29,72,0.06)" stroke-width="1"/>
  
  <!-- Heart icon -->
  <text x="600" y="200" text-anchor="middle" font-size="80" filter="url(#glow)">❤️</text>
  
  <!-- Names -->
  <text x="600" y="290" text-anchor="middle" font-family="'Traditional Arabic', Arial, sans-serif" font-size="72" font-weight="bold" fill="url(#title-grad)" filter="url(#glow)">عبد الرحمن ❤️ بتول</text>
  
  <!-- Tagline -->
  <text x="600" y="360" text-anchor="middle" font-family="'Traditional Arabic', Arial, sans-serif" font-size="28" fill="rgba(255,255,255,0.7)" font-style="italic">قصة حب محفورة في قلبي للأبد</text>
  
  <!-- Bottom decoration -->
  <line x1="350" y1="420" x2="850" y2="420" stroke="rgba(225,29,72,0.3)" stroke-width="1"/>
  <text x="600" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.4)" font-style="italic">For the rest of our life ❤</text>

  <!-- Decorative corners -->
  <path d="M40,40 L40,90 M40,40 L90,40" fill="none" stroke="rgba(251,113,133,0.4)" stroke-width="3"/>
  <path d="M1160,40 L1160,90 M1160,40 L1110,40" fill="none" stroke="rgba(251,113,133,0.4)" stroke-width="3"/>
  <path d="M40,590 L40,540 M40,590 L90,590" fill="none" stroke="rgba(251,113,133,0.4)" stroke-width="3"/>
  <path d="M1160,590 L1160,540 M1160,590 L1110,590" fill="none" stroke="rgba(251,113,133,0.4)" stroke-width="3"/>
</svg>
